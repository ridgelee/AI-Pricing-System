services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: careplan
      POSTGRES_USER: careplan
      POSTGRES_PASSWORD: careplan123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careplan -d careplan"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://careplan:careplan123@db:5432/careplan
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=1
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  worker:
    build: ./backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://careplan:careplan123@db:5432/careplan
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=1
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      celery -A config worker --loglevel=info --concurrency=2

  flower:
    build: ./backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://careplan:careplan123@db:5432/careplan
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    volumes:
      - ./backend:/app
    command: >
      celery -A config flower --port=5555

  test:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://careplan:careplan123@db:5432/careplan
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py migrate --run-syncdb && pytest"
    profiles:
      - test

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
